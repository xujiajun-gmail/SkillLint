version: 1
profile: balanced
language: auto
workspace:
  root: .skilllint-work
  keep_artifacts: false
inputs:
  allow_remote: true
  download_timeout_seconds: 60
  max_archive_size_mb: 100
  max_redirects: 5
  max_input_files: 1000
  max_single_file_mb: 20
  max_total_input_mb: 200
  max_path_depth: 20
  max_path_length: 240
  require_skill_entry: true
outputs:
  format: both
  json_file: result.json
  markdown_file: report.md
  sarif_file: result.sarif.json
  include_snippets: true
  report_language: auto
engines:
  regex:
    enabled: true
  package:
    enabled: true
  semantic:
    enabled: true
    use_llm: false
  dataflow:
    enabled: false
rules:
  include_rule_ids: []
  exclude_rule_ids: []
  include_taxonomies: []
  exclude_taxonomies: []
llm:
  provider: openai
  max_context_chars: 12000
  temperature: 0
  debug: false
severity:
  fail_on: null
