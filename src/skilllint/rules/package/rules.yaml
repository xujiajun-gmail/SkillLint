rules:
  - rule_id: PACKAGE_MISSING_SKILL_MD
    title: Missing canonical SKILL.md
    severity: medium
    taxonomy: SLT-C04
    tags: [package_structure]
    explanation: No SKILL.md was found in the scanned package.
    remediation: Add a canonical SKILL.md or ensure the package points to the actual skill root.
    confidence: high

  - rule_id: PACKAGE_MULTIPLE_SKILL_MD
    title: Multiple SKILL.md files detected
    severity: low
    taxonomy: SLT-A05
    tags: [package_structure, cross_skill]
    explanation: More than one SKILL.md exists in this package, which may indicate nested skills or trigger overlap.
    remediation: Split nested skills into separate packages or document the intended package root clearly.
    confidence: high

  - rule_id: PACKAGE_SYMLINK_PRESENT
    title: Symlink present in skill package
    severity: high
    taxonomy: SLT-C04
    tags: [package_structure]
    explanation: Symlinks in skill packages can redirect scanners or runtime access to unexpected locations.
    remediation: Remove symlinks or replace them with regular files or directories before distribution.
    confidence: high

  - rule_id: PACKAGE_HIDDEN_FILE
    title: Hidden file present in skill package
    severity: low
    taxonomy: SLT-C04
    tags: [package_structure]
    explanation: Hidden files deserve review because they are easy to miss during manual inspection.
    remediation: Review whether this hidden file is necessary; remove it if not essential.
    confidence: medium

  - rule_id: PACKAGE_ARCHIVE_EMBEDDED
    title: Embedded archive found in package
    severity: medium
    taxonomy: SLT-C04
    tags: [package_structure, binary]
    explanation: Nested archives can hide additional payloads or delayed-stage content.
    remediation: Inspect embedded archives explicitly or avoid shipping nested archives in skill packages.
    confidence: high

  - rule_id: PACKAGE_BINARY_PRESENT
    title: Binary artifact present in package
    severity: medium
    taxonomy: SLT-C04
    tags: [package_structure, binary]
    explanation: Binary payloads require explicit review because they cannot be audited like plain text skill files.
    remediation: Audit the binary separately, provide provenance, or remove it from the package.
    confidence: high

  - rule_id: PACKAGE_INSTALL_SCRIPT_PRESENT
    title: Install or bootstrap script present
    severity: medium
    taxonomy: SLT-C01
    tags: [package_structure, script]
    explanation: Installer scripts increase supply-chain risk and should be reviewed closely.
    remediation: Inspect installer scripts carefully and avoid remote execution patterns.
    confidence: high

  - rule_id: PACKAGE_SYSTEM_STARTUP_ARTIFACT
    title: Startup or persistence artifact included in package
    severity: high
    taxonomy: SLT-C04
    tags: [package_structure, persistence]
    explanation: The package contains a shell profile, launch agent, service file, or similar startup artifact that may modify host persistence.
    remediation: Remove system startup artifacts from distributable skills unless they are strictly necessary and clearly disclosed.
    confidence: high

  - rule_id: PACKAGE_CI_WORKFLOW_PRESENT
    title: CI workflow file present in package
    severity: low
    taxonomy: SLT-D01
    tags: [package_structure, workflow]
    explanation: Automation workflow files deserve review because they may blend untrusted input with agent execution in CI.
    remediation: Review workflow prompts, permissions, and untrusted-context handling.
    confidence: medium

  - rule_id: PACKAGE_MANIFEST_LIFECYCLE_SCRIPT
    title: Package manifest contains lifecycle or bootstrap script
    severity: medium
    taxonomy: SLT-C01
    tags: [package_structure, manifest, supply_chain]
    explanation: Package-manager lifecycle scripts such as preinstall, install, postinstall, or prepare can execute automatically during installation.
    remediation: Review lifecycle scripts carefully, remove them when possible, and avoid implicit bootstrap behavior in distributed skills.
    confidence: high

  - rule_id: PACKAGE_REMOTE_DEPENDENCY
    title: Package manifest references remote or VCS dependency
    severity: medium
    taxonomy: SLT-C01
    tags: [package_structure, manifest, dependency, supply_chain]
    explanation: Direct URL or VCS-based dependencies bypass normal registry review and can expand supply-chain risk.
    remediation: Prefer pinned registry releases with provenance, or explicitly review and lock remote dependencies before distribution.
    confidence: high

  - rule_id: PACKAGE_CI_UNPINNED_ACTION
    title: CI workflow uses unpinned action reference
    severity: medium
    taxonomy: SLT-D01
    tags: [package_structure, workflow, supply_chain]
    explanation: GitHub Actions references that use mutable tags instead of full commit SHAs increase supply-chain risk in automation.
    remediation: Pin third-party actions to full commit SHAs and review updates explicitly.
    confidence: high

  - rule_id: PACKAGE_CI_DANGEROUS_TRIGGER
    title: CI workflow uses high-risk trigger
    severity: medium
    taxonomy: SLT-D01
    tags: [package_structure, workflow, automation]
    explanation: Triggers such as pull_request_target, issue_comment, or workflow_run can combine elevated automation with attacker-influenced input or confused-deputy behavior.
    remediation: Restrict high-risk triggers, isolate secrets, and avoid running agentic workflows on untrusted contexts.
    confidence: high

  - rule_id: PACKAGE_CI_ELEVATED_PERMISSIONS
    title: CI workflow grants elevated write permissions
    severity: medium
    taxonomy: SLT-D01
    tags: [package_structure, workflow, permissions]
    explanation: Broad write permissions in CI can amplify the impact of prompt injection or compromised automation steps.
    remediation: Minimize GitHub Actions permissions, prefer read-only defaults, and grant write scopes only to tightly scoped jobs.
    confidence: high

  - rule_id: PACKAGE_DOCKER_REMOTE_BOOTSTRAP
    title: Dockerfile bootstraps from remote content
    severity: high
    taxonomy: SLT-C01
    tags: [package_structure, docker, supply_chain]
    explanation: The Dockerfile downloads or executes remote content during image build, which can introduce unreviewed supply-chain behavior.
    remediation: Prefer pinned local artifacts, verify integrity, and avoid piping remote content directly to a shell.
    confidence: high

  - rule_id: PACKAGE_MANIFEST_RISKY_PERMISSION
    title: Skill manifest declares risky permission or capability
    severity: medium
    taxonomy: SLT-C04
    tags: [package_structure, manifest, permissions]
    explanation: The skill manifest declares a capability such as shell access, unrestricted network, or full filesystem access that deserves closer review.
    remediation: Narrow manifest permissions to the least privilege necessary and disclose risky capabilities clearly.
    confidence: high

  - rule_id: PACKAGE_MANIFEST_STARTUP_HOOK
    title: Skill manifest declares startup or bootstrap hook
    severity: high
    taxonomy: SLT-C01
    tags: [package_structure, manifest, supply_chain]
    explanation: Startup or bootstrap hooks can introduce implicit execution before normal skill use.
    remediation: Avoid startup hooks where possible, and review or disclose any retained bootstrap behavior explicitly.
    confidence: high

  - rule_id: PACKAGE_MANIFEST_LOCAL_ENDPOINT
    title: Skill manifest references localhost or private-network endpoint
    severity: medium
    taxonomy: SLT-B01
    tags: [package_structure, manifest, network]
    explanation: The skill manifest references local or private-network endpoints, which may reach sensitive internal services.
    remediation: Restrict local or private-network access and review whether these endpoints are truly required.
    confidence: high

  - rule_id: PACKAGE_MANIFEST_METADATA_ENDPOINT
    title: Skill manifest references metadata service endpoint
    severity: high
    taxonomy: SLT-B01
    tags: [package_structure, manifest, network]
    explanation: The skill manifest references a cloud metadata endpoint, which can expose credentials or instance metadata.
    remediation: Remove metadata-service access unless it is explicitly required, tightly constrained, and clearly disclosed.
    confidence: high

  - rule_id: PACKAGE_MANIFEST_FLOATING_REFERENCE
    title: Skill manifest uses floating repository or update reference
    severity: medium
    taxonomy: SLT-C01
    tags: [package_structure, manifest, supply_chain]
    explanation: The manifest references a floating location such as a latest channel, which can change without review.
    remediation: Prefer versioned, pinned, and reviewable repository or update references.
    confidence: medium

  - rule_id: PACKAGE_MANIFEST_IDENTITY_MISMATCH
    title: Skill manifest identity conflicts with SKILL.md title
    severity: medium
    taxonomy: SLT-C04
    tags: [package_structure, manifest, trust]
    explanation: The manifest name and the primary SKILL.md title appear inconsistent, which can indicate trust or identity mismatch.
    remediation: Align manifest name, documentation title, and repository identity so reviewers can validate provenance easily.
    confidence: medium

  - rule_id: PACKAGE_MANIFEST_UNDERDECLARED_NETWORK
    title: Skill manifest network capability conflicts with offline or no-network claim
    severity: high
    taxonomy: SLT-E03
    tags: [package_structure, manifest, alignment]
    explanation: The manifest declares network access or remote endpoints while the SKILL.md claims offline or no-network behavior.
    remediation: Align the documentation with actual network capabilities or remove the undeclared network behavior.
    confidence: high

  - rule_id: PACKAGE_MANIFEST_UNDERDECLARED_SHELL
    title: Skill manifest shell capability conflicts with no-shell claim
    severity: high
    taxonomy: SLT-E03
    tags: [package_structure, manifest, alignment]
    explanation: The manifest declares shell access or bootstrap hooks while the SKILL.md claims it does not execute commands.
    remediation: Align the documentation with actual shell capabilities or remove the undeclared execution behavior.
    confidence: high

  - rule_id: PACKAGE_MANIFEST_UNDERDECLARED_WRITE
    title: Skill manifest write capability conflicts with read-only claim
    severity: high
    taxonomy: SLT-E03
    tags: [package_structure, manifest, alignment]
    explanation: The manifest declares full filesystem or write-like capability while the SKILL.md claims read-only behavior.
    remediation: Align the documentation with actual write capabilities or remove the undeclared write behavior.
    confidence: high

  - rule_id: PACKAGE_HIDDEN_UNICODE_MARKER
    title: Hidden unicode or zero-width marker present
    severity: medium
    taxonomy: SLT-C04
    tags: [package_structure, manifest, trust]
    explanation: The package contains hidden unicode markers such as zero-width characters that can obscure review or intent.
    remediation: Remove hidden unicode markers and normalize text content before distribution.
    confidence: high
